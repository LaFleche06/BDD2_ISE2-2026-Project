{% extends 'base.html' %}
{% block title %}Mes classes{% endblock %}
{% block content %}
<div class="ph"><div><h1>🏫 Mes classes</h1></div></div>
<div class="card">
  {% if classes %}
  <div class="table-wrap">
    <table>
      <thead><tr><th>Libellé</th><th>Année scolaire</th></tr></thead>
      <tbody>
      {% for c in classes %}
      <tr>
        <td><strong>{{ c.libelle }}</strong></td>
        <td>{{ c.annee_scolaire or '—' }}</td>
      </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
  {% else %}
  <p style="color:#9ca3af;font-size:13px">Aucune classe affectée.</p>
  {% endif %}
</div>
{% endblock %}
